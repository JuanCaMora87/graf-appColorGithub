<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Selector RGB</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS propio -->
    <link rel="stylesheet" href="./styles.css">
</head>
<body>

<div class="app-bg d-flex align-items-center justify-content-center">
    <div class="rgb-card shadow-lg">
        <h2 class="text-center mb-4">🎨 Selector de Color RGB</h2>

        <div class="text-center mb-4">
            <input type="color" id="colorPicker" value="#000000" class="color-picker">
        </div>

        <div class="control">
            <label>Rojo</label>
            <div class="control-row">
                <input type="range" min="0" max="255" id="red">
                <input type="number" min="0" max="255" id="redNum">
            </div>
        </div>

        <div class="control">
            <label>Verde</label>
            <div class="control-row">
                <input type="range" min="0" max="255" id="green">
                <input type="number" min="0" max="255" id="greenNum">
            </div>
        </div>

        <div class="control">
            <label>Azul</label>
            <div class="control-row">
                <input type="range" min="0" max="255" id="blue">
                <input type="number" min="0" max="255" id="blueNum">
            </div>
        </div>

        <div id="colorBox"></div>

        <div class="hex-display">
            HEX: <span id="hexCode">#000000</span>
        </div>
    </div>
</div>

<script src="./script.js"></script>
</body>
</html>
