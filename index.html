<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Selector RGB</title>

  
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS propio -->
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light">
    <!-- Este es un cambio para control de versiones !! -->

<div class="container d-flex justify-content-center align-items-center">

    <div class="card p-4 shadow" style="max-width: 500px; width: 100%;">

        <h3 class="text-center mb-4">Selector de Color RGB</h3>

          <!-- Color Picker -->
<div class="mb-4 text-center">
    <label class="form-label fw-bold">Seleccionar color</label>
    <input type="color" id="colorPicker" class="form-control form-control-color mx-auto">
</div>

        <!-- Recuadro de color -->
        <div id="colorBox" class="mb-4"></div>

        <!-- Rojo -->
        <div class="row mb-3 align-items-center">
            <div class="col-8">
                <label class="form-label">Rojo (R)</label>
                <input type="range" id="red" class="form-range" min="0" max="255">
            </div>
            <div class="col-4">
                <input type="number" id="redInput" class="form-control" min="0" max="255" value="0">
            </div>
        </div>

        <!-- Verde -->
        <div class="row mb-3 align-items-center">
            <div class="col-8">
                <label class="form-label">Verde (G)</label>
                <input type="range" id="green" class="form-range" min="0" max="255">
            </div>
            <div class="col-4">
                <input type="number" id="greenInput" class="form-control" min="0" max="255" value="0">
            </div>
        </div>

        <!-- Azul -->
        <div class="row mb-3 align-items-center">
            <div class="col-8">
                <label class="form-label">Azul (B)</label>
                <input type="range" id="blue" class="form-range" min="0" max="255">
            </div>
            <div class="col-4">
                <input type="number" id="blueInput" class="form-control" min="0" max="255" value="0">
            </div>
        </div>

        <!-- Resultados 3342342342432-->
        <div class="text-center">
            <p id="rgbText" class="fw-bold">RGB(0, 0, 0)</p>
            <p id="hexText" class="fw-bold">#000000</p>
        </div>
    </div>
</div>


<!-- JS -->
<script src="script.js"></script>
</body>
</html>
